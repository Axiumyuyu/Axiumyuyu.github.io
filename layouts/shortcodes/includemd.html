{{ $file := .Get 0 }}
{{ $res := .Page.Resources.GetMatch $file }}

{{ if $res }}
  {{/* .Content 会将目标文件当作完整的 Hugo 页面进行渲染，支持其中的各种语法和嵌套 */}}
  {{ $res.Content }}
{{ else }}
  <blockquote style="color: red;">
    <strong>构建警告：</strong> 无法在当前页面资源包中找到文件 <code>{{ $file }}</code>。请检查文件名是否正确，以及是否处于同级目录。
  </blockquote>
{{ end }}
